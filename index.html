<!DOCTYPE html>
<html lang="en">
<head>
  <title>Smart Todo App</title>
  <link rel="stylesheet" href="/todolist.css">
</head>
<body>

<div class="auth-box">
  <h1> Smart Todo list</h1>

  <h2>Signup</h2>
  <input class="signup-email" placeholder="Email">
  <input class="signup-password" type="password" placeholder="Password">
  <button class="signup-btn">Signup</button>

  <hr>

  <h2>Login</h2>
  <input class="login-email" placeholder="Email">
  <input class="login-password" type="password" placeholder="Password">
  <button class="login-btn">Login</button>
</div>


<div class="app-box" style="display:none">

  <div class="app-container">

    <div class="header">
      <h1>My Daily Planner</h1>
      <button class="logout-btn">Logout</button>

      <p>Register day-to-day activities to manage your time</p>

      <div class="todo-input-grid">
        <input type="text" placeholder="Todo name" class="js-name-input input-button">
        <input type="date" class="js-due-date-input">
        <input type="time" class="js-start-time-input">
        <input type="time" class="js-end-time-input">
        <button class="add-button js-add-button">Add</button>
      </div>
    </div>

    <div class="js-todo-list todo-grid"></div>

  </div>
</div>
<script type="module" src="/todolist.js"></script>
</body>
</html>
