<!DOCTYPE html>
<html lang="en">
<head>
  <title>Smart Todo App</title>
  <link rel="stylesheet" href="/todolist.css">
</head>
<body>

<!-- AUTH -->
<div class="auth-box" id="authBox">

  <h1>Smart Todo</h1>

  <!-- SIGNUP -->
  <form id="signupForm" class="auth-form">
    <h2>Create Account</h2>
    <input id="signupEmail" placeholder="Email" required>
    <input id="signupPassword" type="password" placeholder="Password" autocomplete="new-password" required>
    <button type="submit">Signup</button>

    <p class="switch-text">
      Already have an account?
      <a href="#" id="showLogin">Login</a>
    </p>
  </form>

  <!-- LOGIN -->
  <form id="loginForm" class="auth-form" style="display:none">
    <h2>Welcome Back</h2>
    <input id="loginEmail" placeholder="Email" required>
    <input id="loginPassword" type="password" placeholder="Password" autocomplete="current-password" required>
    <button type="submit">Login</button>

    <p class="switch-text">
      New user?
      <a href="#" id="showSignup">Create account</a>
    </p>
  </form>

</div>

<!-- APP -->
<div class="app-box" id="appBox" style="display:none">

  <div class="app-container">
    <div class="header">
      <h1>My Daily Planner</h1>
       <div class="header-actions">
       <button id="themeToggle">🌙 Dark</button>
       <button class="logout-btn">Logout</button>
  </div>
      <button class="logout-btn">Logout</button>
    </div>

    <div class="todo-input-grid">
      <input class="js-name-input" placeholder="Task name">
      <input type="date" class="js-due-date-input">
      <input type="time" class="js-start-time-input">
      <input type="time" class="js-end-time-input">
      <button class="add-button js-add-button">Add</button>
    </div>

    <div class="js-todo-list"></div>
  </div>

</div>

<script type="module" src="/todolist.js"></script>
</body>
</html>
